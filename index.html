<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinPoint Golf Event</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe5;
      --paper: #fffdf8;
      --ink: #18201b;
      --muted: #55635a;
      --line: #d9d0be;
      --accent: #1f5c3f;
      --accent-soft: #e4f0e9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(31, 92, 63, 0.12), transparent 38%),
        linear-gradient(180deg, #efe7d6 0%, var(--bg) 28%, #f7f3eb 100%);
      color: var(--ink);
      line-height: 1.55;
    }

    main {
      width: min(720px, calc(100% - 40px));
      margin: 0 auto;
      padding: 52px 0 72px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid rgba(24, 32, 27, 0.08);
      border-radius: 28px;
      padding: 32px 28px;
      box-shadow: 0 22px 60px rgba(24, 32, 27, 0.08);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    dl {
      display: grid;
      grid-template-columns: minmax(96px, max-content) 1fr;
      gap: 10px 16px;
      margin: 26px 0;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    a {
      color: var(--accent);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      text-decoration: none;
    }

    .secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }

    @media (max-width: 520px) {
      main {
        width: min(100% - 24px, 720px);
        padding-top: 20px;
      }

      .panel {
        border-radius: 18px;
        padding: 24px 20px;
      }

      dl {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="eyebrow">PinPoint Golf</div>
      <h1 id="title">Tournament Event</h1>
      <p>This shared event opens directly in PinPoint Golf when the app is installed.</p>

      <dl id="details"></dl>

      <div class="actions">
        <a class="button" id="open-app" href="pinpointgolf://event">Open in PinPoint Golf</a>
        <a class="button secondary" href="/">Privacy Policy</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const value = (...keys) => {
      for (const key of keys) {
        const raw = params.get(key);
        if (raw && raw.trim()) return raw.trim();
      }
      return "";
    };

    const title = value("fullTitle", "eventTitle", "title", "course") || "Tournament Event";
    const course = value("course", "courseName");
    const city = value("city");
    const state = value("state", "st");
    const date = value("dateText", "date");
    const location = [course, [city, state].filter(Boolean).join(", ")].filter(Boolean).join(" - ");

    document.getElementById("title").textContent = title;

    const details = [
      ["Date", date],
      ["Location", location]
    ].filter(([, detail]) => detail);

    const list = document.getElementById("details");
    if (details.length) {
      for (const [label, detail] of details) {
        const term = document.createElement("dt");
        term.textContent = label;
        const desc = document.createElement("dd");
        desc.textContent = detail;
        list.append(term, desc);
      }
    } else {
      list.remove();
    }

    const openApp = document.getElementById("open-app");
    const query = params.toString();
    openApp.href = query ? `pinpointgolf://event?${query}` : "pinpointgolf://event";
  </script>
</body>
</html>
